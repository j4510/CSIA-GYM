{% extends "base.html" %}

{% block title %}Login - CSIA GYM{% endblock %}

{% block content %}
<!-- LOGIN PAGE -->

<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h2 class="text-3xl font-bold text-center mb-6" style="color: #f5f5f5;">Login</h2>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <!-- Username Field -->
            <div class="mb-4">
                <label for="username" class="block font-semibold mb-2" style="color:#e5e5e5;">
                    Username
                </label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       required
                       autofocus
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
                       placeholder="Enter your username">
            </div>
            
            <!-- Password Field -->
            <div class="mb-6">
                <label for="password" class="block font-semibold mb-2" style="color:#e5e5e5;">
                    Password
                </label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
                       placeholder="Enter your password">
            </div>
            
            <!-- Remember me -->
            <div class="mb-4">
                <label class="flex items-center gap-2" style="cursor:pointer;">
                    <input type="checkbox" name="remember" style="width:16px;height:16px;accent-color:#8b0000;cursor:pointer;">
                    <span style="color:#e5e5e5;font-size:0.875rem;">Keep me logged in for 30 days</span>
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                    class="w-full bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700 transition">
                Login
            </button>
        </form>
        
        <!-- Registration Link -->
        <p class="text-center mt-6" style="color:#888;">
            Don't have an account? 
            <a href="{{ url_for('auth.register') }}" class="text-red-600 hover:underline">
                Register here
            </a>
        </p>
    </div>
</div>

{% endblock %}
