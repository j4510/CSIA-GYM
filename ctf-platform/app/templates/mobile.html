<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Not Supported - CSIA GYM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/images.ico') }}">
    <style>
        body {
            background: #0a0a0a;
            color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div style="max-width: 480px; width: 100%; text-align: center;">
        <div style="background: #000; border: 4px solid #8b0000; padding: 3rem 2rem; box-shadow: 0 4px 32px rgba(139,0,0,0.3);">

            <div style="font-size: 5rem; margin-bottom: 1rem;">📵</div>

            <div style="border-top: 2px solid #8b0000; border-bottom: 2px solid #8b0000; padding: 1rem 0; margin-bottom: 1.5rem;">
                <h1 style="font-size: 1.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; color: #f5f5f5;">
                    MOBILE NOT SUPPORTED
                </h1>
            </div>

            <p style="color: #e0e0e0; font-weight: 700; text-transform: uppercase; font-size: 0.95rem; margin-bottom: 0.75rem; opacity: 0.8;">
                CSIA GYM IS CURRENTLY DESIGNED FOR DESKTOP USE ONLY.
            </p>
            <p style="color: #a0a0a0; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 2.5rem;">
                PLEASE VISIT US ON A DESKTOP OR LAPTOP BROWSER FOR THE FULL EXPERIENCE. YOU MAY CHECK THE SCOREBOARD FOR NOW.
            </p>

            <a href="{{ url_for('challenges.scoreboard') }}"
               style="display: inline-block; background: #8b0000; color: #fff; padding: 0.875rem 2rem; font-weight: 900; text-transform: uppercase; text-decoration: none; letter-spacing: 0.05em; border: 2px solid #8b0000; transition: background 0.2s;">
                VIEW SCOREBOARD →
            </a>

        </div>
    </div>
</body>
</html>
