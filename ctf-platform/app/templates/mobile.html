<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limited Mobile Access - CSIA GYM</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/images.ico') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #0a0a0a;
      border: 1px solid rgba(139,0,0,0.5);
      padding: 2rem 1.5rem;
      box-shadow: 0 0 40px rgba(139,0,0,0.15);
    }
    .eyebrow {
      font-size: 0.6rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #cc0000;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.78rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      margin-bottom: 1.75rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid rgba(139,0,0,0.2);
    }
    .section-label {
      font-size: 0.6rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #444;
      margin-bottom: 0.75rem;
    }
    .link-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .mobile-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(139,0,0,0.06);
      border: 1px solid rgba(139,0,0,0.2);
      color: #e5e5e5;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: border-color 0.15s, background 0.15s;
    }
    .mobile-link:hover { border-color: #cc0000; background: rgba(139,0,0,0.12); color: #fff; }
    .mobile-link .icon { font-size: 1.1rem; flex-shrink: 0; }
    .mobile-link .arrow { margin-left: auto; color: #cc0000; font-size: 0.9rem; }
    .notice {
      font-size: 0.7rem;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1.6;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(139,0,0,0.15);
    }
    .notice strong { color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">■ Mobile Access</div>
    <h1>Limited<br>Mobile View</h1>
    <p class="subtitle">Some pages require a desktop browser</p>

    <div class="section-label">Available on mobile</div>
    <div class="link-list">
      <a href="{{ url_for('challenges.scoreboard') }}" class="mobile-link">
        <span class="icon">🏆</span> Scoreboard
        <span class="arrow">→</span>
      </a>
      <a href="{{ url_for('community.list') }}" class="mobile-link">
        <span class="icon">💬</span> Community
        <span class="arrow">→</span>
      </a>
      <a href="{{ url_for('settings.badges') }}" class="mobile-link">
        <span class="icon">🎖️</span> Badges
        <span class="arrow">→</span>
      </a>
      <a href="{{ url_for('settings.ranks') }}" class="mobile-link">
        <span class="icon">📊</span> Ranks
        <span class="arrow">→</span>
      </a>
      <a href="{{ url_for('settings.account') }}" class="mobile-link">
        <span class="icon">👤</span> My Account
        <span class="arrow">→</span>
      </a>
      <a href="{{ url_for('settings.index') }}" class="mobile-link">
        <span class="icon">⚙️</span> Settings
        <span class="arrow">→</span>
      </a>
    </div>

    <p class="notice">
      <strong>Challenges, submissions, and admin tools</strong> require a desktop or laptop browser for the full experience.
    </p>

    <div style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid rgba(139,0,0,0.2);">
      <a href="{{ url_for('auth.logout') }}" class="mobile-link" style="border-color:rgba(139,0,0,0.35);background:rgba(139,0,0,0.08);">
        <span class="icon">🚪</span> Logout
        <span class="arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
