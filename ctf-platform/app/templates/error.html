{% extends "base.html" %}

{% block title %}{{ code }} - {{ title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto text-center fade-in" style="padding: 4rem 0;">

    <div class="bg-black border-4 border-red-600 p-12 shadow-lg hover-brutal">

        <div class="text-8xl font-black text-red-600 mb-4" style="line-height: 1;">
            {{ code }}
        </div>

        <div class="border-t-2 border-b-2 border-red-600 py-4 mb-6">
            <h1 class="text-3xl font-black uppercase tracking-tight">{{ title }}</h1>
        </div>

        <p class="text-lg opacity-80 uppercase font-bold mb-10">{{ message }}</p>

        <div class="flex justify-center gap-4 flex-wrap">
            <a href="javascript:history.back()"
               class="inline-block bg-black border-2 border-red-600 text-white px-6 py-3 font-black uppercase hover:bg-red-600 transition-all">
                ← GO BACK
            </a>
            <a href="{{ url_for('auth.index') }}"
               class="inline-block bg-red-600 text-black px-6 py-3 font-black uppercase hover:bg-white hover:text-black transition-all">
                ⌂ HOME
            </a>
        </div>

    </div>

</div>
{% endblock %}
