version: '3.8'

services:
  web:
    build: .
    container_name: ctf-platform
    expose:
      - "5050"
    env_file:
      - .env
    volumes:
      - instance_data:/app/instance
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M

  nginx:
    image: nginx:alpine   # 👈 lighter than default
    container_name: ctf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro   # 👈 your certs here
    depends_on:
      - web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 100M

volumes:
  instance_data: